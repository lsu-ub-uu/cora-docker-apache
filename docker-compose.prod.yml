services:
  cora-apache:
    build:
      context: ./docker
      dockerfile: Dockerfile
    image: cora-docker-apache:latest
    restart: unless-stopped
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD", "httpd", "-t"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64M
      - /var/run:size=16M
      - /var/log:size=64M
      - /usr/local/apache2/logs:size=32M
    volumes:
      - shibboleth-run:/var/run/shibboleth
    environment:
      - APACHE_LOG_DIR=/var/log/apache2
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.25"

volumes:
  shibboleth-run:

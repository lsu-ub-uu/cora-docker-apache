LoadModule deflate_module modules/mod_deflate.so
LoadModule headers_module modules/mod_headers.so
LoadModule expires_module modules/mod_expires.so

# Compression
AddOutputFilterByType DEFLATE \
application/xml \
text/html \
text/plain \
text/xml \
text/css \
text/javascript \
application/javascript \
application/vnd.cora.recordList+json \
application/vnd.cora.record+json \
application/vnd.cora.recordList+xml \
application/vnd.cora.record+xml \
application/xml \
application/vnd.cora.workorder+xml \
application/vnd.cora.workorder+json \
application/vnd.cora.record-decorated+xml \
application/vnd.cora.record-decorated+json \
application/vnd.cora.recordList-decorated+xml \
application/vnd.cora.recordList-decorated+json

DeflateCompressionLevel 6

# Security headers
Header always set X-Content-Type-Options "nosniff"
Header always set X-Frame-Options "SAMEORIGIN"
Header always set Referrer-Policy "strict-origin-when-cross-origin"
ServerTokens Prod
ServerSignature Off
TraceEnable Off

# Cache static assets
<IfModule mod_expires.c>
    ExpiresActive On
    ExpiresByType text/css "access plus 1 month"
    ExpiresByType text/javascript "access plus 1 month"
    ExpiresByType application/javascript "access plus 1 month"
    ExpiresByType image/png "access plus 1 month"
    ExpiresByType image/jpeg "access plus 1 month"
    ExpiresByType image/svg+xml "access plus 1 month"
</IfModule>

RequestHeader set X-Original-URI expr=%{REQUEST_URI}